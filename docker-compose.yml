version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # --replSet: multi-document transactions (used by the EXP ledger for
    # atomic earn/spend + rollback) require a replica set, even a
    # single-node one. Initialize once with:
    #   docker compose exec mongo mongosh --eval "rs.initiate()"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/adaptive-code-platform
    depends_on:
      - mongo
    ports:
      - "5001:5001"
    networks:
      - internal
      - default

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - default

networks:
  internal:
    internal: true # DB not reachable from outside the compose network
  default:

volumes:
  mongo-data: