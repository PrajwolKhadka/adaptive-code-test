services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/adaptive-code-platform
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
    depends_on:
      - mongo
    ports:
      - "5001:5001"
    networks:
      - internal
      - default

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ${NEXT_PUBLIC_HCAPTCHA_SITE_KEY}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - default

networks:
  internal:
    internal: true
  default:

volumes:
  mongo-data: